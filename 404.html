<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Best Shower Heads</title>
  <script src="components/site-config.js"></script>
  <style>
    :root { --primary: #455A64; --accent: #00BCD4; --text: #3e3e3e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: var(--text); background: #fff; }
    .error-page { max-width: 600px; margin: 0 auto; padding: 6rem 1.5rem; text-align: center; }
    .error-code { font-size: 6rem; font-weight: 800; color: var(--primary); opacity: .2; }
    h1 { font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 2rem; }
    .btn { background: var(--accent); color: #fff; padding: .75rem 2rem; border-radius: .375rem; text-decoration: none; font-weight: 600; display: inline-block; }
    .btn:hover { background: #00838F; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Back to Homepage</a>
  </div>
  <footer id="site-footer"></footer>
  <script src="components/site-components.js?v=4"></script>
</body>
</html>
